worker_processes auto;
pid /run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 基本优化
    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout  75s;
    keepalive_requests 1000;

    # 关闭代理缓冲（对 SSE 流式响应很重要）
    proxy_buffering       off;
    proxy_cache           off;
    proxy_request_buffering off;

    # 长超时 - 流式聊天可能持续数分钟
    proxy_read_timeout    900s;
    proxy_send_timeout    900s;
    proxy_connect_timeout 30s;

    # 上游服务定义
    upstream cpa {
        server 127.0.0.1:8317 max_fails=3 fail_timeout=10s;
        keepalive 64;
    }
    upstream cpamp {
        server 127.0.0.1:18317 max_fails=3 fail_timeout=10s;
        keepalive 16;
    }

    # 日志格式
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$upstream_addr" $request_time';
    access_log /dev/stdout main buffer=32k flush=5s;

    server {
        # 端口由 entrypoint.sh 通过 sed 替换（Render 的 PORT 环境变量）
        listen {{PORT}} default_server;
        server_name _;

        client_max_body_size 100m;

        # ==================== 管理面板（CPAMP）路由 ====================

        # 健康检查（Render 需要的）
        location = /health {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CPAMP 状态
        location = /status {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CPAMP 初始设置
        location = /setup {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CPAMP 配置服务
        location /usage-service/ {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 管理面板 HTML（单文件 React 应用）
        location = /management.html {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # CPA 管理 API → CPAMP（CPAMP 处理用量/定价，其余代理回 CPA）
        location /v0/management/ {
            proxy_pass http://cpamp;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ==================== CPA 核心 API 路由 ====================

        # 所有其他请求 → CPA
        location / {
            proxy_pass http://cpa;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 流式 SSE 支持
            proxy_set_header X-Accel-Buffering no;
        }
    }
}
